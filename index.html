<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Virtual - Optimizada para Móvil</title>
    <link rel="stylesheet" href="styles.css">
</head>
<header class= "navbar">
<h2>📚 Biblioteca Escolar</h2>
</header>
<body>
    <h1>Biblioteca Virtual</h1>
    <input type="text" id="buscador" placeholder="Buscar por nombre, autor, año o categoría...">
    <button id="boton-favoritos">Ver Favoritos</button>
    <div id="contenedor-libros"></div>

    <div id="visor">
        <h2>Visualización del Libro</h2>
        <iframe id="iframe-pdf" src=""></iframe>
        <button id="cerrar-visor" onclick="cerrarVisor()">Cerrar</button>
    </div>

    <script>
        const libros = [
            { id: 1, nombre: "El Gran Gatsby", autor: "F. Scott Fitzgerald", año: 1925, categoria: "Clásico", pdf: "./libros/gatsby.pdf", portada: "https://m.media-amazon.com/images/I/61OVAqqS7ZL._SL1000_.jpg" },
            { id: 2, nombre: "1984", autor: "George Orwell", año: 1949, categoria: "Distopía", pdf: "./libros/1984.pdf", portada: "https://m.media-amazon.com/images/I/71kxa1ZxHeL._SL1500_.jpg" },
            { id: 3, nombre: "Cien Años de Soledad", autor: "Gabriel García Márquez", año: 1967, categoria: "Realismo mágico", pdf: "./libros/soledad.pdf", portada: "https://www.raptisrarebooks.com/wp-content/uploads/2022/09/RRB-137469.jpg" },
            { id: 4, nombre: "Don Quijote de la Mancha", autor: "Miguel de Cervantes", año: 1605, categoria: "Aventura", pdf: "https://descargameyape.com/wp-content/uploads/2025/12/Don_Quijote_de_la_Mancha-Cervantes_Miguel-1.pdf", portada: "https://descargameyape.com/wp-content/uploads/2025/12/Don-quijote-de-la-chancha.jpg" },
            { id: 5, nombre: "Orgullo y Prejuicio", autor: "Jane Austen", año: 1813, categoria: "Romance", pdf: "./libros/orgullo.pdf", portada: "https://m.media-amazon.com/images/I/71HqC9TzbWL._SL1000_.jpg" },
            { id: 6, nombre: "El Principito", autor: "Antoine de Saint-Exupéry", año: 1943, categoria: "Infantil", pdf: "./libros/principito.pdf", portada: "https://m.media-amazon.com/images/I/71AVK5VIAzL._SL1000_.jpg" },
            { id: 7, nombre: "Harry Potter y la Piedra Filosofal", autor: "J.K. Rowling", año: 1997, categoria: "Fantasía", pdf: "./libros/harry.pdf", portada: "https://m.media-amazon.com/images/I/81C6QScDA2L._SL1000_.jpg" },
        ];

        const contenedor = document.getElementById('contenedor-libros');
        const buscador = document.getElementById('buscador');
        const iframePdf = document.getElementById('iframe-pdf');
        const visor = document.getElementById('visor');
        const botonFavoritos = document.getElementById('boton-favoritos');

        let mostrandoFavoritos = false;
        let favoritos = JSON.parse(localStorage.getItem('favoritosBiblioteca')) || [];
        let calificaciones = JSON.parse(localStorage.getItem('calificacionesBiblioteca')) || {};

        function guardarDatos() {
            localStorage.setItem('favoritosBiblioteca', JSON.stringify(favoritos));
            localStorage.setItem('calificacionesBiblioteca', JSON.stringify(calificaciones));
        }

        function toggleFavorito(id) {
            if (favoritos.includes(id)) {
                favoritos = favoritos.filter(fav => fav !== id);
            } else {
                favoritos.push(id);
            }
            guardarDatos();
            renderizarLibros();
        }

        function setCalificacion(id, valor) {
            calificaciones[id] = valor;
            guardarDatos();
            renderizarLibros();
        }

        function crearRating(id, valorActual) {
            const ratingDiv = document.createElement('div');
            ratingDiv.className = 'rating';
            for (let i = 5; i >= 1; i--) {
                const span = document.createElement('span');
                span.onclick = () => setCalificacion(id, i);
                if (valorActual >= i) {
                    span.classList.add('activa');
                }
                ratingDiv.appendChild(span);
            }
            return ratingDiv;
        }

        function renderizarLibros() {
            let librosAMostrar = mostrandoFavoritos ? libros.filter(l => favoritos.includes(l.id)) : libros;
            const texto = buscador.value.toLowerCase();
            if (texto) {
                librosAMostrar = librosAMostrar.filter(l => 
                    l.nombre.toLowerCase().includes(texto) ||
                    l.autor.toLowerCase().includes(texto) ||
                    l.año.toString().includes(texto) ||
                    l.categoria.toLowerCase().includes(texto)
                );
            }

            contenedor.innerHTML = '';
            if (librosAMostrar.length === 0) {
                contenedor.innerHTML = '<p style="text-align:center; color:#666; width:100%; font-size:18px;">No se encontraron libros.</p>';
            }

            librosAMostrar.forEach(libro => {
                const esFavorito = favoritos.includes(libro.id);
                const calificacionActual = calificaciones[libro.id] || 0;
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-libro';
                tarjeta.innerHTML = `
                    <img src="${libro.portada}" alt="${libro.nombre}" class="portada">
                    <div class="info-libro">
                        <h3>${libro.nombre}</h3>
                        <p><strong>Autor:</strong> ${libro.autor}</p>
                        <p><strong>Año:</strong> ${libro.año}</p>
                        <p class="categoria"><strong>Categoría:</strong> ${libro.categoria}</p>
                    </div>
                    <div class="rating-container"></div>
                    <div class="acciones">
                        <button class="favorito-btn ${esFavorito ? 'favorito' : ''}" onclick="toggleFavorito(${libro.id})">❤️</button>
                        <button onclick="visualizarPdf('${libro.pdf}')">Visualizar</button>
                        <a href="${libro.pdf}" download="${libro.nombre}.pdf"><button>Descargar</button></a>
                    </div>
                `;
                const ratingContainer = tarjeta.querySelector('.rating-container');
                ratingContainer.appendChild(crearRating(libro.id, calificacionActual));
                contenedor.appendChild(tarjeta);
            });
        }

        botonFavoritos.addEventListener('click', () => {
            mostrandoFavoritos = !mostrandoFavoritos;
            botonFavoritos.textContent = mostrandoFavoritos ? 'Ver Todos los Libros' : 'Ver Favoritos';
            renderizarLibros();
        });

        buscador.addEventListener('input', renderizarLibros);

        function visualizarPdf(url) {
            iframePdf.src = url;
            visor.style.display = 'flex';
        }

        function cerrarVisor() {
            visor.style.display = 'none';
            iframePdf.src = '';
        }

        renderizarLibros();
    </script>
</body>
</html>
